name: Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Start postgres
        run: docker compose --profile services up -d --wait db

      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Test
        env:
          DATABASE_URL: postgres://app:password@localhost:5432/tracing
        run: nix develop --command bash -c "cd app && bun test"
