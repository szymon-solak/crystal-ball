apiVersion: 1

datasources:
  - name: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      timeout: 60
      maxLines: 1000

  - name: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'

  - name: postgres
    type: postgres
    url: db:5432
    user: grafanareader
    secureJsonData:
      password: 'password'
    jsonData:
      database: tracing
      sslmode: 'disable'

