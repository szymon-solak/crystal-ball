server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
  # log_received_spans:
  #  enabled: true
  # log_discarded_spans:
  #  enabled: true
  #  include_all_attributes: true

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

metrics_generator:
  registry:
    external_labels:
      source: tempo

  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

  traces_storage:
    path: /var/tempo/generator/traces

  processor:
    local_blocks:
      filter_server_spans: false
      flush_to_storage: true

    service_graphs:
      max_items: 10000
      wait: 10s
      dimensions:
        - http.method
        - http.status_code

    span_metrics:
      histogram_buckets: [0.002, 0.004, 0.008, 0.016, 0.032, 0.064, 0.128, 0.256, 0.512, 1.024, 2.048, 4.096, 8.192, 16.384]
      dimensions:
        - service.name
        - span.name
        - span.kind
        - status.code
      intrinsic_dimensions:
        service: true
        span_name: true
        span_kind: true
        status_code: true
      enable_target_info: true


overrides:
  defaults:
    metrics_generator:
      processors: ["local-blocks", "service-graphs", "span-metrics"]
      generate_native_histograms: both

block_builder:
  consume_cycle_duration: 30s

usage_report:
  reporting_enabled: false
